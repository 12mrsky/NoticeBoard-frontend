<div class="admin-layout d-flex">

  <!-- SIDEBAR -->
  <aside
    class="sidebar"
    [class.collapsed]="sidebarCollapsed">

    <!-- Sidebar Header -->
    <div class="sidebar-header">

      <button
        class="menu-btn"
        (click)="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>

      <div class="brand">

        <div class="brand-logo">
          <i class="bi bi-shield-check"></i>
        </div>

   <div class="brand-text">
  <h4>Excise Portal</h4>
  <small>Administration</small>
</div>

      </div>

    </div>

    <!-- Navigation -->
    <div class="list-group list-group-flush flex-grow-1">

      <a routerLink="/admin/dashboard"
         routerLinkActive="active"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
      </a>

      <a routerLink="/admin/notice"
         routerLinkActive="active"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-megaphone-fill"></i>
        <span>Notice Management</span>
      </a>

      <a routerLink="/admin/under-development"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-receipt"></i>
        <span>Challan</span>
      </a>

      <a routerLink="/admin/under-development"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-person-badge"></i>
        <span>CM</span>
      </a>

      <a routerLink="/admin/under-development"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-building"></i>
        <span>Company</span>
      </a>

      <a routerLink="/admin/under-development"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-shield-exclamation"></i>
        <span>Crime Investigation</span>
      </a>

      <a routerLink="/admin/under-development"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-cup-hot"></i>
        <span>Excise</span>
      </a>

      <a routerLink="/admin/under-development"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-arrow-left-right"></i>
        <span>Import / Export</span>
      </a>

      <a routerLink="/admin/under-development"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-patch-check"></i>
        <span>Label Registration</span>
      </a>

      <a routerLink="/admin/under-development"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-award"></i>
        <span>License</span>
      </a>

      <a routerLink="/admin/under-development"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-database"></i>
        <span>Master</span>
      </a>

      <a routerLink="/admin/under-development"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-journal-text"></i>
        <span>Patrak</span>
      </a>

      <a routerLink="/admin/under-development"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-house-check"></i>
        <span>Property Detail</span>
      </a>

      <a routerLink="/admin/under-development"
         class="sidebar-link list-group-item list-group-item-action">
        <i class="bi bi-people-fill"></i>
        <span>User Management</span>
      </a>

    </div>

    <!-- Footer -->
    <div class="sidebar-footer">

      <button
        class="btn btn-danger logout-btn w-100"
        (click)="logout()">
        <i class="bi bi-box-arrow-right"></i>
        Logout
      </button>

    </div>

  </aside>

  <!-- CONTENT -->
  <main
    class="content-area"
    [class.expanded]="sidebarCollapsed">

    <button
      *ngIf="sidebarCollapsed"
      class="toggle-btn"
      (click)="toggleSidebar()">
      <i class="bi bi-list"></i>
    </button>

    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>

  </main>

</div>
