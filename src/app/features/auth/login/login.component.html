<div class="login-wrapper">

  <div class="login-card">

    <!-- Logo Section -->
    <div class="login-logo">

      <div class="logo-circle">
        <i class="bi bi-shield-lock-fill"></i>
      </div>

      <h2>Excise Admin Portal</h2>
      <p>Secure Administrative Access</p>

    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="alert alert-danger py-2">
      {{ errorMessage }}
    </div>

    <!-- Username -->
    <div class="form-group">
      <label>Username</label>
      <input
        [(ngModel)]="username"
        type="text"
        class="form-control"
        placeholder="Enter Username">
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Password</label>
      <input
        [(ngModel)]="password"
        type="password"
        class="form-control"
        placeholder="Enter Password">
    </div>

    <!-- Captcha -->
    <div class="captcha-box">

      <div class="captcha-text">

        <span
          *ngFor="let char of captchaText.split(''); let i = index"
          [ngStyle]="captchaStyles[i]">

          {{ char }}

        </span>

      </div>

      <button
        type="button"
        class="captcha-refresh-btn"
        (click)="generateCaptcha()"
        title="Refresh Captcha">

        <i class="bi bi-arrow-clockwise"></i>

      </button>

    </div>

    <!-- Enter Captcha -->
    <div class="form-group mt-3">

      <label>Captcha</label>

      <input
        [(ngModel)]="userCaptcha"
        class="form-control"
        placeholder="Enter Captcha">

    </div>

    <!-- Login Button -->
    <button
      class="btn btn-login w-100"
      (click)="login()"
      [disabled]="loading">

      <span *ngIf="!loading">
        <i class="bi bi-box-arrow-in-right me-2"></i>
        Login
      </span>

      <span *ngIf="loading">
        Please wait...
      </span>

    </button>

    <!-- Footer -->
    <div class="login-footer">

      <i class="bi bi-shield-check"></i>
      Secure Access • Excise Management System

    </div>

  </div>

</div>
